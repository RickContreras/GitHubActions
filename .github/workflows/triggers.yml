name: Probando Triggers
run-name: ¡Probando Triggers!
on:
  push:
    branches:
      - aprendiendo-github-actions
  pull_request:
    branches:
      - aprendiendo-github-actions
  watch:
    types: [started]

jobs:
    Saludo:
        runs-on: ubuntu-latest
        steps:
          - name: Exportación
            uses: actions/checkout@v4
          - name: Configuración de Python
            uses: actions/setup-python@v5
            with:
                python-version: '3.10'
          - name: Definir variable
            run: echo "USERNAME=${{ github.actor }}" >> $GITHUB_ENV
          - name: Correr script
            run: python hola_mundo.py
