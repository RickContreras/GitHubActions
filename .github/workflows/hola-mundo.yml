name: saludo
on: [push]

jobs:
    saludo:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
                uses: actions/checkout@v4
            - name: Setup Python
                uses: actions/setup-python@v5
                with:
                    python-version: '3.10' 
            - name: Run script
                run: python hola_mundo.py
